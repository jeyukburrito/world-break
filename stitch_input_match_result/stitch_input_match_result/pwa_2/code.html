<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface-container-highest": "#e1e2e4",
                "inverse-on-surface": "#f0f1f3",
                "on-secondary-fixed": "#001e2f",
                "on-secondary-container": "#004a6d",
                "on-tertiary-fixed-variant": "#6d3a00",
                "surface-container": "#edeef0",
                "on-secondary": "#ffffff",
                "surface-dim": "#d9dadc",
                "secondary": "#006492",
                "inverse-surface": "#2e3132",
                "surface-tint": "#5948ce",
                "on-secondary-fixed-variant": "#004b6f",
                "tertiary-fixed-dim": "#ffb77b",
                "on-tertiary-container": "#fff0e6",
                "on-tertiary-fixed": "#2e1500",
                "primary-container": "#6a5ae0",
                "surface-variant": "#e1e2e4",
                "on-surface": "#191c1e",
                "surface-container-lowest": "#ffffff",
                "surface": "#f8f9fb",
                "surface-container-low": "#f3f4f6",
                "tertiary-container": "#a75b00",
                "on-primary": "#ffffff",
                "on-surface-variant": "#474554",
                "surface-bright": "#f8f9fb",
                "primary-fixed": "#e4dfff",
                "error": "#ba1a1a",
                "error-container": "#ffdad6",
                "on-error-container": "#93000a",
                "outline-variant": "#c8c4d6",
                "surface-container-high": "#e7e8ea",
                "primary-fixed-dim": "#c7bfff",
                "tertiary-fixed": "#ffdcc2",
                "secondary-container": "#58bcfd",
                "on-tertiary": "#ffffff",
                "primary": "#513fc6",
                "secondary-fixed": "#cae6ff",
                "on-error": "#ffffff",
                "inverse-primary": "#c7bfff",
                "outline": "#787585",
                "tertiary": "#844600",
                "on-primary-fixed": "#170065",
                "on-primary-fixed-variant": "#412bb6",
                "on-background": "#191c1e",
                "on-primary-container": "#f5f1ff",
                "background": "#f8f9fb",
                "secondary-fixed-dim": "#8ccdff"
              },
              fontFamily: {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-40">
<!-- TopAppBar -->
<header class="bg-surface/70 dark:bg-slate-900/70 backdrop-blur-xl docked full-width top-0 sticky z-50 no-border bg-surface-container-low dark:bg-slate-800 shadow-[0_12px_32px_-4px_rgba(25,28,30,0.08)] flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-indigo-600 dark:text-indigo-400">style</span>
<h1 class="text-lg font-black tracking-tighter text-indigo-700 dark:text-indigo-300">TCG MATCH TRACKER</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500">notifications</span>
</div>
</header>
<main class="px-5 pt-6 space-y-10">
<!-- Page Title Editorial -->
<section>
<span class="label-sm text-[10px] font-bold uppercase tracking-widest text-primary mb-1 block">New Record</span>
<h2 class="text-2xl font-bold tracking-tight text-on-surface">결과 입력</h2>
</section>
<!-- Section 1: Tournament Category (Large Segmented Control) -->
<section class="space-y-4">
<h3 class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline">Tournament Category</h3>
<div class="flex p-1.5 bg-surface-container-low rounded-xl">
<button class="flex-1 py-3 text-sm font-bold rounded-lg bg-surface-container-lowest shadow-sm text-primary">Friendly</button>
<button class="flex-1 py-3 text-sm font-medium rounded-lg text-outline hover:bg-slate-100/50 transition-colors">Store</button>
<button class="flex-1 py-3 text-sm font-medium rounded-lg text-outline hover:bg-slate-100/50 transition-colors">CS</button>
</div>
</section>
<!-- Section 2: Dropdowns (Custom Sheets Style) -->
<section class="grid grid-cols-1 gap-4">
<div class="space-y-2">
<label class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline">Card Game</label>
<div class="flex items-center justify-between px-4 py-4 bg-surface-container-high rounded-xl">
<span class="text-sm font-medium">Yu-Gi-Oh! TCG</span>
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline">My Deck</label>
<div class="flex items-center justify-between px-4 py-4 bg-surface-container-high rounded-xl">
<span class="text-sm font-medium">Snake-Eye</span>
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline">Opponent Deck</label>
<div class="flex items-center justify-between px-4 py-4 bg-surface-container-high rounded-xl">
<span class="text-sm font-medium">Voiceless</span>
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Section 3: Result Buttons -->
<section class="space-y-4">
<h3 class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline">Match Result</h3>
<div class="grid grid-cols-2 gap-4">
<button class="h-24 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary flex flex-col items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
<span class="text-lg font-bold">승리</span>
</button>
<button class="h-24 rounded-2xl bg-surface-container-lowest border-2 border-outline-variant/15 text-outline flex flex-col items-center justify-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl">sentiment_dissatisfied</span>
<span class="text-lg font-bold">패배</span>
</button>
</div>
</section>
<!-- Section 4: Formats & Turn -->
<section class="grid grid-cols-2 gap-6">
<div class="space-y-4">
<h3 class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline text-center">Format</h3>
<div class="flex bg-surface-container-low p-1 rounded-full">
<button class="flex-1 py-2 text-[10px] font-black rounded-full bg-surface-container-lowest shadow-sm text-on-surface">BO1</button>
<button class="flex-1 py-2 text-[10px] font-black rounded-full text-outline">BO3</button>
</div>
</div>
<div class="space-y-4">
<h3 class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline text-center">Turn Order</h3>
<div class="flex bg-surface-container-low p-1 rounded-full">
<button class="flex-1 py-2 text-[10px] font-black rounded-full text-outline">1ST</button>
<button class="flex-1 py-2 text-[10px] font-black rounded-full bg-surface-container-lowest shadow-sm text-on-surface">2ND</button>
</div>
</div>
</section>
<!-- Section 5: Notes -->
<section class="space-y-2 pb-10">
<label class="label-sm text-[11px] font-bold uppercase tracking-wider text-outline">Match Notes</label>
<textarea class="w-full h-32 bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-outline/50" placeholder="상대방 사이딩 정보나 플레이 미스 등을 기록하세요..."></textarea>
</section>
</main>
<!-- Sticky Save Button -->
<div class="fixed bottom-24 left-0 right-0 px-5 z-40">
<button class="w-full h-[56px] bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl font-bold text-lg shadow-[0_12px_32px_-4px_rgba(81,63,198,0.3)] active:scale-[0.98] transition-all">
            결과 저장
        </button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 w-full bg-surface/80 dark:bg-slate-900/80 backdrop-blur-lg flex justify-around items-center border-t border-slate-200/10 h-20 z-50 px-4 pb-safe shadow-[0_-8px_24px_-4px_rgba(25,28,30,0.06)]">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-indigo-500 transition-colors" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-indigo-500 transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Records</span>
</a>
<a class="flex flex-col items-center justify-center bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-200 rounded-2xl px-5 py-2 transition-all" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Input</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-indigo-500 transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Settings</span>
</a>
</nav>
</body></html>
